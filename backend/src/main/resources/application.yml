spring:
  application:
    name: locafy-backend

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/locafy}
      auto-index-creation: true
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 150MB
      max-request-size: 150MB

  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

jwt:
  secret: ${JWT_SECRET:locafy-dev-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
  access-expiry: ${JWT_ACCESS_EXPIRY:900}
  refresh-expiry: ${JWT_REFRESH_EXPIRY:604800}

google:
  client-id: ${GOOGLE_CLIENT_ID:}
  maps-api-key: ${GOOGLE_MAPS_API_KEY:}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  verify-service-sid: ${TWILIO_VERIFY_SERVICE_SID:}
  from-number: ${TWILIO_FROM_NUMBER:}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  platform-fee-percent: ${PLATFORM_FEE_PERCENT:10}

logging:
  level:
    com.locafy: DEBUG
    org.springframework.security: INFO
