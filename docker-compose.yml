version: '3.9'

services:
  # MongoDB is expected to be running separately (or use a managed Atlas instance in prod)
  # For local dev: docker run -d --name locafy-mongo -p 27017:27017 mongo:7.0
  # OR uncomment below to start it with this compose file:
  # mongodb:
  #   image: mongo:7.0
  #   container_name: locafy-mongodb
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: locafy-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mongodb_data:
  redis_data:
